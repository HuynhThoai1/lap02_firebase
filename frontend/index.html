<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskers | Premium To-Do App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=7">
</head>

<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="glass" id="main-nav" style="display: none; justify-content: space-between; align-items: center;">
            <div class="logo" style="flex: 1;">TASKERS</div>
            <div class="view-tabs" style="display: flex; gap: 0.5rem; flex: 1; justify-content: center;">
                <button class="btn btn-primary" id="tab-list-view">List View</button>
                <button class="btn" id="tab-calendar-view"
                    style="background: transparent; border: 1px solid var(--glass-border);">Calendar View</button>
                <button class="btn" id="tab-week-view"
                    style="background: transparent; border: 1px solid var(--glass-border);">Weekly View</button>
            </div>
            <div class="user-profile" id="user-profile" style="flex: 1; justify-content: flex-end;">
                <span id="user-email"></span>
                <button class="btn btn-primary" id="logout-btn">Logout</button>
            </div>
        </nav>

        <div class="container">
            <!-- Auth Screen -->
            <div id="auth-screen" class="auth-container glass">
                <h2 id="auth-title">Welcome Back</h2>
                <p id="auth-subtitle" style="color: var(--text-muted); margin-bottom: 2rem;">Sign in to continue to
                    Stellar Tasks.</p>
                <div id="auth-form">
                    <input type="email" id="email" placeholder="Email" style="margin-bottom: 1rem;"
                        autocomplete="email">
                    <input type="password" id="password" placeholder="Password" style="margin-bottom: 1rem;"
                        autocomplete="current-password">
                    <button class="btn btn-primary" id="auth-submit-btn" style="width: 100%;">Sign In</button>
                </div>
                <div style="margin-top: 1rem; text-align: center; font-size: 0.9rem;">
                    <a href="#" id="auth-toggle-link" style="color: var(--primary); text-decoration: none;">Don't have
                        an account? Sign up</a>
                </div>
                <div style="margin: 1.5rem 0; color: var(--text-muted); text-align: center;">or</div>
                <button class="btn btn-google" id="google-login-btn">
                    <svg width="18" height="18" viewBox="0 0 18 18">
                        <path fill="#4285F4"
                            d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.8 2.73v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.62z" />
                        <path fill="#34A853"
                            d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.83.85-3.06.85-2.35 0-4.34-1.58-5.05-3.71H.95v2.33C2.43 15.89 5.5 18 9 18z" />
                        <path fill="#FBBC05"
                            d="M3.95 10.7c-.18-.54-.28-1.1-.28-1.7s.1-1.16.28-1.7V4.97H.95C.34 6.18 0 7.55 0 9s.34 2.82.95 4.03l3-2.33z" />
                        <path fill="#EA4335"
                            d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.47.89 11.43 0 9 0 5.5 0 2.43 2.11.95 5.22L3.95 7.3c.71-2.13 2.7-3.72 5.05-3.72z" />
                    </svg>
                    Continue with Google
                </button>
            </div>

            <div id="main-content" style="display: none;">
                <!-- Task Detail Modal moved outside list-view-section -->
                <div id="task-modal" class="modal-overlay">
                    <div class="modal-content glass">
                        <h3 id="modal-title">Edit Task</h3>
                        <div class="modal-body">
                            <label>Title</label>
                            <input type="text" id="edit-task-title" class="glass-input">

                            <label>Description</label>
                            <textarea id="edit-task-desc" rows="3" class="glass-input"></textarea>

                            <div style="margin-top: 1.5rem;">
                                <label>Date & Time</label>
                                <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem; align-items: center;">
                                    <input type="date" id="edit-task-date" class="glass-input" style="flex: 2;">

                                    <div style="display: flex; flex: 1; align-items: center; gap: 4px;"
                                        title="Start Time">
                                        <input type="number" id="edit-task-start-hour" class="glass-input" min="0"
                                            max="23" style="padding: 0.5rem; width: 50px; text-align: center;">
                                        <span>:</span>
                                        <input type="number" id="edit-task-start-minute" class="glass-input" min="0"
                                            max="59" style="padding: 0.5rem; width: 50px; text-align: center;">
                                    </div>

                                    <span style="color: var(--text-muted);">-</span>

                                    <div style="display: flex; flex: 1; align-items: center; gap: 4px;"
                                        title="End Time">
                                        <input type="number" id="edit-task-end-hour" class="glass-input" min="0"
                                            max="23" style="padding: 0.5rem; width: 50px; text-align: center;">
                                        <span>:</span>
                                        <input type="number" id="edit-task-end-minute" class="glass-input" min="0"
                                            max="59" style="padding: 0.5rem; width: 50px; text-align: center;">
                                    </div>
                                </div>
                            </div>
                            <div style="margin-top: 1rem;">
                                <label>Label</label>
                                <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                                    <select id="edit-task-label-select" class="glass-input" style="flex: 1;">
                                        <!-- Options injected -->
                                    </select>
                                    <input type="text" id="modal-new-label-name" placeholder="New Label..."
                                        class="glass-input" style="flex: 1;">
                                    <input type="color" id="modal-new-label-color" value="#3b82f6"
                                        style="height: 40px; padding: 0; width: 40px; border-radius: 8px;">
                                    <button class="btn btn-primary" id="modal-create-label-btn">Add</button>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-primary" id="save-task-btn">Save Changes</button>
                            <button class="btn" id="delete-task-modal-btn"
                                style="background: var(--accent); color: white;">Delete Task</button>
                            <button class="btn" id="close-modal-btn">Cancel</button>
                        </div>
                    </div>
                </div>

                <section class="task-input-section glass">
                    <div class="input-main">
                        <input type="text" id="new-task-title" placeholder="Add a task..." autocomplete="off">
                        <button class="btn btn-primary" id="add-task-btn">Add</button>
                    </div>
                    <div class="input-options">
                        <div class="option-item" id="schedule-option">
                            <span class="icon">📅</span>
                            <span class="option-label" id="schedule-label">Today, Now</span>
                            <div class="option-dropdown" id="schedule-dropdown"
                                style="display:none; width: 440px; flex-direction: row; gap: 1.5rem; padding: 1.25rem;">
                                <!-- Left: Date -->
                                <div
                                    style="flex: 1.2; display: flex; flex-direction: column; gap: 0.5rem; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 1.25rem;">
                                    <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem;">Date</div>
                                    <div class="dropdown-item" data-value="today">Today</div>
                                    <div class="dropdown-item" data-value="tomorrow">Tomorrow</div>
                                    <div class="dropdown-item" data-value="custom" id="custom-date-trigger">Pick a date...</div>
                                    <div id="mini-calendar-container"
                                        style="display:none; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-top: 5px;">
                                        <div
                                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                                            <button class="btn" style="padding: 2px 8px; font-size: 0.8rem;"
                                                onclick="prevMiniMonth(event)">&lt;</button>
                                            <span id="mini-calendar-month"
                                                style="font-weight: 600; font-size: 0.85rem;"></span>
                                            <button class="btn" style="padding: 2px 8px; font-size: 0.8rem;"
                                                onclick="nextMiniMonth(event)">&gt;</button>
                                        </div>
                                        <div id="mini-calendar-grid"
                                            style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center;">
                                        </div>
                                    </div>
                                </div>
                                <!-- Right: Time -->
                                <div style="flex: 1; display: flex; flex-direction: column; gap: 1rem;">
                                    <div style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem;">Time</div>
                                    <div
                                        style="display: flex; align-items: center; justify-content: space-between; gap: 5px;">
                                        <span style="font-size: 0.7rem; color: var(--text-muted); width: 35px;">Start</span>
                                        <div style="display: flex; align-items: center; gap: 4px;">
                                            <input type="number" id="quick-task-hour" class="glass-input" min="0" max="23"
                                                style="padding: 0.4rem; width: 42px; text-align: center;">
                                            <span style="font-size: 0.8rem;">:</span>
                                            <input type="number" id="quick-task-minute" class="glass-input" min="0" max="59"
                                                style="padding: 0.4rem; width: 42px; text-align: center;">
                                        </div>
                                    </div>
                                    <div
                                        style="display: flex; align-items: center; justify-content: space-between; gap: 5px;">
                                        <span style="font-size: 0.7rem; color: var(--text-muted); width: 35px;">End</span>
                                        <div style="display: flex; align-items: center; gap: 4px;">
                                            <input type="number" id="quick-task-end-hour" class="glass-input" min="0" max="23"
                                                style="padding: 0.4rem; width: 42px; text-align: center;">
                                            <span style="font-size: 0.8rem;">:</span>
                                            <input type="number" id="quick-task-end-minute" class="glass-input" min="0" max="59"
                                                style="padding: 0.4rem; width: 42px; text-align: center;">
                                        </div>
                                    </div>
                                    <button id="quick-time-clear" class="btn"
                                        style="padding: 0.5rem; width: 100%; font-size: 0.75rem; border-radius: 6px; margin-top: auto; background: rgba(255,255,255,0.05);">
                                        Clear / Default
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="option-item" id="label-option">
                            <span class="icon">🏷️</span>
                            <span class="option-label" id="selected-label-text">Default</span>
                            <div class="option-dropdown" id="label-dropdown">
                                <div data-value="Default" data-color="#ffffff">Default (White)</div>
                                <div id="custom-label-creator">
                                    <hr>
                                    <input type="text" id="new-label-name" placeholder="New label name..."
                                        style="font-size: 12px; margin-bottom: 5px;">
                                    <input type="color" id="new-label-color" value="#8b5cf6"
                                        style="height: 25px; padding: 0;">
                                    <button class="btn btn-primary" id="create-label-btn"
                                        style="width: 100%; font-size: 11px; padding: 4px;">Create</button>
                                </div>
                            </div>
                        </div>
                        <div class="option-item" id="expand-task-btn" title="Detailed Task" style="margin-left: auto;">
                            <span class="icon">⤢</span>
                            <span class="option-label">Expand</span>
                        </div>
                    </div>
                </section>

                <div class="app-grid" id="list-view-section">
                    <!-- Task List -->
                    <div class="task-list-section">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                            <h2>Your Tasks</h2>
                            <button class="btn btn-primary" id="show-all-tasks-btn"
                                style="padding: 0.4rem 1rem; font-size: 0.8rem; background: var(--glass-border);">Show
                                All</button>
                        </div>
                        <div id="tasks-container" class="task-list">
                            <!-- Tasks will be injected here -->
                        </div>
                    </div>

                    <!-- Sidebar: Calendar -->
                    <aside>
                        <div class="calendar-widget glass">
                            <div class="calendar-header">
                                <h3 id="current-month">April 2026</h3>
                                <div class="nav-btns">
                                    <button class="btn" style="padding: 0.5rem;" id="prev-month">&lt;</button>
                                    <button class="btn" style="padding: 0.5rem;" id="next-month">&gt;</button>
                                </div>
                            </div>
                            <div class="calendar-grid" id="calendar-days">
                                <!-- Days injected here -->
                            </div>
                        </div>
                    </aside>
                </div> <!-- End List View Section -->

                <!-- Calendar View Section -->
                <div id="calendar-view-section" style="display: none; margin-top: 2rem;">
                    <div class="glass" style="padding: 1.5rem; border-radius: 1rem; width: 100%;">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                            <h2 id="full-calendar-month">April 2026</h2>
                            <div style="display: flex; gap: 0.5rem;">
                                <button class="btn" id="full-prev-month"
                                    style="background: var(--glass-border);">&lt;</button>
                                <button class="btn" id="full-next-month"
                                    style="background: var(--glass-border);">&gt;</button>
                            </div>
                        </div>
                        <div id="full-calendar-grid"
                            style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; min-height: 600px;">
                            <!-- Full calendar days injected here -->
                        </div>
                    </div>
                </div> <!-- End Calendar View Section -->

                <!-- Week View Section -->
                <div id="week-view-section" style="display: none; margin-top: 2rem;">
                    <div class="glass" style="padding: 1.5rem; border-radius: 1rem; width: 100%;">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                            <h2 id="week-view-label">Week of April 20-26, 2026</h2>
                            <div style="display: flex; gap: 0.5rem;">
                                <button class="btn" id="week-prev-btn"
                                    style="background: var(--glass-border);">&lt;</button>
                                <button class="btn" id="week-next-btn"
                                    style="background: var(--glass-border);">&gt;</button>
                            </div>
                        </div>
                        <div id="week-calendar-grid" class="week-calendar-container">
                            <!-- Headers: Time corner + 7 Days -->
                            <div class="week-header-row" id="week-headers"></div>

                            <!-- All Day Row -->
                            <div class="week-allday-row" id="week-allday-grid"></div>

                            <!-- Scrollable 24h Grid -->
                            <div class="week-body-scroll">
                                <div class="week-body-grid" id="week-body-grid">
                                    <!-- Time column + 7 day columns -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div> <!-- End Week View Section -->
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import firebaseConfig from "./js/firebase-config.js";

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Export for other scripts
        window.firebaseApp = app;
        window.firebaseAuth = auth;
    </script>

    <!-- App Scripts -->
    <script type="module" src="js/auth.js?v=19"></script>
    <script type="module" src="js/api.js?v=19"></script>
    <script type="module" src="js/app.js?v=19"></script>
    <script type="module" src="js/calendar.js?v=19"></script>
</body>

</html>
